org.joget.marketplace.DatalistBinderWrapper.title=Load Binder Wrapper
org.joget.marketplace.DatalistBinderWrapper.listBinder=Select Original Source of Data
org.joget.marketplace.DatalistBinderWrapper.script=Script
org.joget.marketplace.DatalistBinderWrapper.script.desc=Enter script in Java to manipulate content returned by load binder above. Variable "data" and "columns" are injected.
org.joget.marketplace.DatalistBinderWrapper.useFormattedDataCount=Use Formatted Data Row Count
org.joget.marketplace.DatalistBinderWrapper.useFormattedDataCount.desc=When enabled, total row count is based on the data returned by the script instead of the original binder count. Use this when the script filters or adds rows.
org.joget.marketplace.DatalistBinderWrapper.script.sample=import java.util.Iterator;\nimport java.util.Map;\nimport org.joget.apps.datalist.model.DataListColumn;\nimport org.joget.apps.form.model.FormRow;\nimport org.joget.apps.form.model.FormRowSet;\nimport org.joget.commons.util.LogUtil;\n\nint counter = 1;\nfor (Iterator i= data.iterator(); i.hasNext();) {\n  Map row = (Map)i.next();\n  \tfor (int j=0; j<columns.length; j++) {\n      DataListColumn column = columns[j];\n      String columnName = column.getName();\n      try{\n        String value = (String) row.get(columnName);\n        LogUtil.info(\"Load Binder Wrapper\", \"Row \" + counter + \" - \" + columnName + \" :: \" + value);\n        if(columnName.equals(\"Name\") && value != null && !value.isEmpty()){\n          row.setProperty(columnName, value + \" world\");\n        }\n      }catch(Exception ex){\n        //ignore\n      }\n\t}\n\tcounter++;\n}\n\nreturn data;